<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: deep navy, rounded corners -->
  <rect width="64" height="64" rx="13" fill="#0f172a"/>

  <!-- TOP bar of Z — white -->
  <line x1="12" y1="16" x2="52" y2="16" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

  <!-- DIAGONAL of Z — lime accent.
       This stroke IS the "×" / multiply concept in ZetaX.
       It runs bold from top-right to bottom-left, suggesting infinite scale / trajectory. -->
  <line x1="52" y1="16" x2="12" y2="48" stroke="#a3e635" stroke-width="7" stroke-linecap="round"/>

  <!-- BOTTOM bar of Z — white -->
  <line x1="12" y1="48" x2="52" y2="48" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

  <!-- Accent dot at top-right corner — the "infinite scale" origin point, glowing -->
  <circle cx="52" cy="16" r="5" fill="#a3e635"/>
</svg>
